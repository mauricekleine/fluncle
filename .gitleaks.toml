# gitleaks configuration — the leak-prevention backstop (CI runs gitleaks on every
# PR + push; see .github/workflows/gitleaks.yml). Extends the default ruleset with a
# tight allowlist for values that are intentionally public (runtime identifiers, not
# secrets) and for non-source directories.
#
# This catches accidentally-committed SECRET VALUES (tokens, keys) via the default
# ruleset over the FULL git history. op:// 1Password PATH hygiene is a separate concern
# (references, not secrets — and history can't be un-leaked), handled by the working-tree
# grep step in .github/workflows/gitleaks.yml + AGENTS.md "Public Repo"; concrete vault/
# item names live behind the private Ops Runbook note in 1Password.
title = "Fluncle gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Intentionally-public identifiers (runtime config, not secrets) + non-source paths"
regexTarget = "match"
regexes = [
  # The Cloudflare R2 account id is a runtime Worker binding (wrangler.jsonc) — a
  # public account IDENTIFIER, not a credential. It is useless without the actual
  # R2 token, which is a Worker secret and never in the repo.
  '''0651fd3b33d9e0b2fe72a5f13e5cf65d''',
  # The IndexNow ownership token, served publicly at /<key>.txt so search engines can
  # verify domain ownership before accepting URL submissions. Public by design — it is
  # not a credential and grants nothing beyond proving we control the served file.
  '''8337c1b41068549f248bf56f1fc465df''',
  # Feed content-type MIME strings in the surfaces registry (`apiFormat`) — RSS/Atom/
  # JSON-Feed media types, not secrets. gitleaks' generic-api-key rule false-positives
  # the `...+xml` / `...+json` media types.
  '''application/(rss|atom)\+xml''',
  '''application/feed\+json''',
]
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)\.dev/''',
  '''(^|/)dist/''',
  '''(^|/)\.output/''',
  '''(^|/)\.source/''',
  '''(^|/)\.(claude|agents)/''',
  '''(^|/)bun\.lock$''',
  # generated Worker types carry the public R2 account id (covered by the regex too)
  '''apps/web/worker-configuration\.d\.ts$''',
]
