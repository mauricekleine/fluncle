# Fluncle Hermes gateway config. Non-secret only — secrets come from the env via
# `--env-file /etc/hermes.env` (OPENROUTER_API_KEY, FLUNCLE_API_TOKEN, the Discord
# bot token). Deployed to ~/.hermes/config.yaml on the devbox. See
# docs/agents/hermes-agent.md.
#
# Model: OpenRouter BYO key. Must be >=64k context and pinned (a smaller window
# takes the whole gateway down at startup). Sonnet 4.6 chosen for voice adherence
# — flash/generic models slip the deadpan + first-person Fluncle voice. Haiku 4.5
# (anthropic/claude-haiku-4.5) is the cheaper fallback if traffic ever bites.
model:
  provider: openrouter
  default: anthropic/claude-sonnet-4.6

# Discord: reply inline in the channel; an @mention no longer spawns a thread.
discord:
  auto_thread: false

# Env passthrough to spawned `--no-agent` cron scripts. The gateway WITHHOLDS its
# recognized infrastructure secrets (provider keys + gateway/tool tokens —
# OPENROUTER_API_KEY, DISCORD_*, CLAUDE_CODE_OAUTH_TOKEN) from subprocesses by default,
# and only passes UNRECOGNIZED custom vars (FLUNCLE_API_TOKEN) through (Hermes security
# docs § Environment Variable Passthrough). The observe-sweep cron's `claude -p` step
# needs CLAUDE_CODE_OAUTH_TOKEN, and its auth-failure alert needs DISCORD_ALERT_WEBHOOK —
# both arrive via /etc/hermes.env, so allowlist them here (the documented mechanism, which
# replaced an earlier file-sourcing workaround). FLUNCLE_API_TOKEN is listed for clarity
# though it already passes by default.
terminal:
  env_passthrough:
    - FLUNCLE_API_TOKEN
    - CLAUDE_CODE_OAUTH_TOKEN
    - DISCORD_ALERT_WEBHOOK
