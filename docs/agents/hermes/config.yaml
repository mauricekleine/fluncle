# Fluncle Hermes gateway config. Non-secret only — secrets come from the env via
# `--env-file /etc/hermes.env` (OPENROUTER_API_KEY, FLUNCLE_API_TOKEN, the Discord
# bot token). Deployed to ~/.hermes/config.yaml on the devbox. See
# docs/agents/hermes-agent.md.
#
# Model: OpenRouter BYO key. Must be >=64k context and pinned (a smaller window
# takes the whole gateway down at startup). Sonnet 4.6 chosen for voice adherence
# — flash/generic models slip the deadpan + first-person Fluncle voice. Haiku 4.5
# (anthropic/claude-haiku-4.5) is the cheaper fallback if traffic ever bites.
model:
  provider: openrouter
  default: anthropic/claude-sonnet-4.6

# Discord: reply inline in the channel; an @mention no longer spawns a thread.
discord:
  auto_thread: false
