[install]
# Hoisted node_modules layout: required by the Expo/Metro bundler in apps/mobile
# (Metro/Babel can't resolve plugins across bun's isolated .bun/ store). The other
# apps (Vite/TanStack) are unaffected.
linker = "hoisted"
# Only install package versions published at least 3 days ago
minimumReleaseAge = 259200
# cnfast — adopted ahead of the age window by explicit operator decision.
minimumReleaseAgeExcludes = ["cnfast"]
