name: Quality Checks

on:
  workflow_call:
    inputs:
      checkout-ref:
        required: false
        type: string
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

permissions:
  contents: read

jobs:
  check:
    name: Lint, Format, and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout-ref || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/ssh/go.mod
          cache-dependency-path: |
            apps/ssh/go.sum
            apps/dns/go.sum

      - name: Cache Bun packages
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Turbo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Run Oxlint
        run: bun run lint

      - name: Run Format Check
        run: bun run format:check

      - name: Run Typecheck
        run: bun run typecheck

      - name: Run Tests
        run: bun run test

      # The Hermes sweep + track-enrichment scripts live outside the workspaces, so
      # `turbo run test` never sees them — ~400 tests, including the proof that their
      # no-network rail is armed, went unrun until this step existed.
      - name: Run Script Tests
        run: bun run test:scripts

      - name: Build Go (apps/ssh)
        run: go build -C apps/ssh ./...

      - name: Vet Go (apps/ssh)
        run: go vet -C apps/ssh ./...

      - name: Test Go (apps/ssh)
        run: go test -C apps/ssh ./...

      - name: Check Go formatting (apps/ssh)
        run: test -z "$(gofmt -l apps/ssh)"

      - name: Build Go (apps/dns)
        run: go build -C apps/dns ./...

      - name: Vet Go (apps/dns)
        run: go vet -C apps/dns ./...

      - name: Test Go (apps/dns)
        run: go test -C apps/dns ./...

      - name: Check Go formatting (apps/dns)
        run: test -z "$(gofmt -l apps/dns)"

      # apps/sonar — Fluncle's first Rust app (the in-memory vector sidecar).
      # Same "non-TS app in apps/" pattern as apps/ssh and apps/dns above.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache Cargo (apps/sonar)
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/sonar/target
          key: cargo-${{ runner.os }}-${{ hashFiles('apps/sonar/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check Rust formatting (apps/sonar)
        run: cargo fmt --manifest-path apps/sonar/Cargo.toml --check

      - name: Lint Rust (apps/sonar)
        run: cargo clippy --manifest-path apps/sonar/Cargo.toml --all-targets -- -D warnings

      - name: Build Rust (apps/sonar)
        run: cargo build --release --manifest-path apps/sonar/Cargo.toml

      - name: Test Rust (apps/sonar)
        run: cargo test --manifest-path apps/sonar/Cargo.toml
