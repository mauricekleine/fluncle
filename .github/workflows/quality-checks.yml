name: Quality Checks

on:
  workflow_call:
    inputs:
      checkout-ref:
        required: false
        type: string
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

permissions:
  contents: read

jobs:
  check:
    name: Lint, Format, and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout-ref || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: apps/ssh/go.mod
          cache-dependency-path: apps/ssh/go.sum

      - name: Cache Bun packages
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Oxlint
        run: bun run lint

      - name: Run Format Check
        run: bun run format:check

      - name: Run Typecheck
        run: bun run typecheck

      - name: Run Tests
        run: bun run test

      - name: Build Go (apps/ssh)
        run: go build -C apps/ssh ./...

      - name: Vet Go (apps/ssh)
        run: go vet -C apps/ssh ./...

      - name: Test Go (apps/ssh)
        run: go test -C apps/ssh ./...

      - name: Check Go formatting (apps/ssh)
        run: test -z "$(gofmt -l apps/ssh)"
