name: Post-deploy Probe

# After a push to main deploys (Cloudflare Workers Builds rebuilds apps/web on
# every push), wait until production is serving the pushed commit, then sweep every
# public surface and go red if anything stopped resolving. This is the RESOLUTION
# half of monitoring — the automated form of the `fluncle-smoke` skill — complementing
# Sentry (errors) and the 10-minute up/down prober (service health).
#
# No secrets: the probe issues public GETs only (strictly read-only, side-effect-free).
# A red check IS the alert — per repo doctrine the operator watches Actions after a push.

on:
  push:
    branches: [main]

concurrency:
  # A newer push supersedes an older one's probe (its deploy is coalesced/superseded
  # anyway); no need to run both to completion.
  cancel-in-progress: true
  group: post-deploy-probe

permissions:
  contents: read

jobs:
  probe:
    name: Wait for deploy, then sweep surfaces
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Full history so `git merge-base --is-ancestor` can resolve a coalesced,
          # ahead-of-us deployed commit (see the wait step).
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun packages
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Wait for production to serve this commit
        env:
          # The commit this workflow run is for.
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          HEALTH_URL="https://www.fluncle.com/api/v1/health"
          DEADLINE=$(( $(date +%s) + 20 * 60 ))  # ~20 min
          echo "Waiting for $HEALTH_URL to report sha=$TARGET_SHA (or a descendant of it)…"

          while :; do
            SERVED="$(curl -fsS --max-time 10 "$HEALTH_URL" | jq -r '.sha // empty' || true)"

            if [ -n "$SERVED" ]; then
              if [ "$SERVED" = "$TARGET_SHA" ]; then
                echo "Production is serving $TARGET_SHA — proceeding to the sweep."
                exit 0
              fi

              # Build coalescing: rapid pushes coalesce in Cloudflare Workers Builds,
              # so the DEPLOYED commit can be AHEAD of this run's commit. If the served
              # commit has our commit as an ancestor, our change did ship — treat the
              # wait as satisfied and still run the sweep.
              git fetch --quiet origin main || true
              if git cat-file -e "${SERVED}^{commit}" 2>/dev/null && \
                 git merge-base --is-ancestor "$TARGET_SHA" "$SERVED"; then
                echo "Production is serving $SERVED, a descendant of $TARGET_SHA (coalesced) — proceeding."
                exit 0
              fi

              echo "  prod serves $SERVED, still waiting for $TARGET_SHA (or a descendant)…"
            else
              echo "  /api/v1/health has no sha yet, waiting…"
            fi

            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "::error::Deploy never landed: production served '${SERVED:-<none>}' after 20m, expected $TARGET_SHA (or a descendant). The build likely failed or is still running — check the Cloudflare Workers Build. (This is NOT a probe failure.)"
              exit 1
            fi

            sleep 15
          done

      - name: Sweep public surfaces
        run: bun run --cwd apps/web scripts/post-deploy-probe.ts
