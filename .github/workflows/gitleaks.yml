name: gitleaks

# The leak-prevention backstop for the open-source repo. Two checks on every PR +
# push to main: (1) gitleaks scans the FULL git history for accidentally-committed
# secret VALUES (tokens, keys); config + allowlist in .gitleaks.toml. (2) a working-
# TREE grep keeps the current tree free of concrete op:// 1Password paths (references,
# not secrets — history can't be un-leaked, so this is tree-only; placeholders pass).
# See AGENTS.md "Public Repo".
#
# We run the gitleaks CLI directly (the official pinned image) rather than the
# gitleaks-action wrapper: the CLI is unconditionally free (the action gates some
# features behind GITLEAKS_LICENSE), the pin is reproducible, and it is the exact
# invocation validated locally. Bump the pin via the fluncle-maintenance skill.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: gitleaks-${{ github.ref }}

jobs:
  scan:
    name: Scan git history for committed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # full history — gitleaks `git` mode scans every commit

      - name: gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            git /repo --config=/repo/.gitleaks.toml --redact --exit-code 1 --no-banner

      - name: op:// path hygiene (working tree)
        # History can't be un-leaked; this keeps the CURRENT tree free of concrete
        # op:// 1Password paths. Placeholders (op://$VAR/... or op://<vault>/...) pass.
        # See AGENTS.md "Public Repo".
        run: |
          if git grep -nE 'op://[A-Za-z0-9]' -- . ':!.github/workflows/gitleaks.yml'; then
            echo "::error::Concrete op:// 1Password path in a committed file — use a placeholder (op://\$FLUNCLE_1PASSWORD_ENV_ITEM/...). See AGENTS.md 'Public Repo'."
            exit 1
          fi
