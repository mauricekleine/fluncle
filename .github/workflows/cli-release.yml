name: CLI Release

on:
  push:
    branches: [main]
    paths:
      - apps/cli/**
  workflow_dispatch:

concurrency:
  cancel-in-progress: false
  group: cli-release-main

jobs:
  quality:
    name: Quality Checks
    uses: ./.github/workflows/quality-checks.yml
    with:
      checkout-ref: ${{ github.sha }}

  build:
    name: Tag, release, and build standalone CLI binaries
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate next CLI version
        id: version
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_version="0.1.0"
          else
            version="${latest_tag#v}"
            major="$(printf '%s' "$version" | cut -d. -f1)"
            minor="$(printf '%s' "$version" | cut -d. -f2)"
            next_version="${major}.$((minor + 1)).0"
          fi

          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$next_version" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        env:
          FLUNCLE_CLI_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          define="FLUNCLE_CLI_VERSION=\"${FLUNCLE_CLI_VERSION}\""

          bun build ./apps/cli/src/cli.ts --compile --target=bun-darwin-arm64 --define "$define" --outfile ./apps/cli/dist/fluncle-darwin-arm64
          bun build ./apps/cli/src/cli.ts --compile --target=bun-darwin-x64 --define "$define" --outfile ./apps/cli/dist/fluncle-darwin-x64
          bun build ./apps/cli/src/cli.ts --compile --target=bun-linux-arm64 --define "$define" --outfile ./apps/cli/dist/fluncle-linux-arm64
          bun build ./apps/cli/src/cli.ts --compile --target=bun-linux-x64 --define "$define" --outfile ./apps/cli/dist/fluncle-linux-x64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            apps/cli/dist/fluncle-* \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Automated CLI release for ${{ github.sha }}."
