name: CLI Release

on:
  push:
    branches: [main]
    paths:
      - apps/cli/**
  workflow_dispatch:

concurrency:
  cancel-in-progress: false
  group: cli-release-main

jobs:
  quality:
    name: Quality Checks
    uses: ./.github/workflows/quality-checks.yml
    with:
      checkout-ref: ${{ github.sha }}

  build:
    name: Tag, release, and build standalone CLI binaries
    runs-on: ubuntu-latest
    needs: [quality]
    permissions:
      contents: write
      id-token: write # OIDC trusted publishing to npm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Calculate next CLI version
        id: version
        run: |
          set -euo pipefail

          latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [ -z "$latest_tag" ]; then
            next_version="0.1.0"
          else
            version="${latest_tag#v}"
            major="$(printf '%s' "$version" | cut -d. -f1)"
            minor="$(printf '%s' "$version" | cut -d. -f2)"
            next_version="${major}.$((minor + 1)).0"
          fi

          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$next_version" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        env:
          FLUNCLE_CLI_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          define="FLUNCLE_CLI_VERSION=\"${FLUNCLE_CLI_VERSION}\""

          bun build ./apps/cli/src/cli.ts --compile --target=bun-darwin-arm64 --define "$define" --outfile ./apps/cli/dist/fluncle-darwin-arm64
          bun build ./apps/cli/src/cli.ts --compile --target=bun-darwin-x64 --define "$define" --outfile ./apps/cli/dist/fluncle-darwin-x64
          bun build ./apps/cli/src/cli.ts --compile --target=bun-linux-arm64 --define "$define" --outfile ./apps/cli/dist/fluncle-linux-arm64
          bun build ./apps/cli/src/cli.ts --compile --target=bun-linux-x64 --define "$define" --outfile ./apps/cli/dist/fluncle-linux-x64

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            apps/cli/dist/fluncle-* \
            --target "${{ github.sha }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Automated CLI release for ${{ github.sha }}."

      # One source of truth (the release version above) -> npm + Homebrew, the
      # same version as the GitHub Release. npm publishes via OIDC trusted
      # publishing (no token; the publisher is configured for this repo). The tap
      # step no-ops until its secret exists.
      - name: Set up Node for npm publish
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm (fluncle, OIDC trusted publishing)
        # No token: OIDC. The `fluncle` package's trusted publisher is configured
        # for this repo + workflow (see apps/cli/packaging/README.md).
        env:
          FLUNCLE_CLI_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          npm install -g npm@latest # OIDC trusted publishing needs npm >= 11.5.1
          bun run --cwd apps/cli build:npm
          cd apps/cli/dist-npm
          npm publish --provenance --access public

      - name: Bump the Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "No HOMEBREW_TAP_TOKEN secret - skipping tap bump. Add it + create the tap to enable."
            exit 0
          fi
          sha_da=$(shasum -a 256 apps/cli/dist/fluncle-darwin-arm64 | cut -d' ' -f1)
          sha_dx=$(shasum -a 256 apps/cli/dist/fluncle-darwin-x64  | cut -d' ' -f1)
          sha_la=$(shasum -a 256 apps/cli/dist/fluncle-linux-arm64 | cut -d' ' -f1)
          sha_lx=$(shasum -a 256 apps/cli/dist/fluncle-linux-x64   | cut -d' ' -f1)
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/mauricekleine/homebrew-fluncle.git" tap
          mkdir -p tap/Formula
          sed -e "s/^  version \".*\"/  version \"${VERSION}\"/" \
              -e "s/REPLACE_WITH_SHA256_OF_fluncle-darwin-arm64/${sha_da}/" \
              -e "s/REPLACE_WITH_SHA256_OF_fluncle-darwin-x64/${sha_dx}/" \
              -e "s/REPLACE_WITH_SHA256_OF_fluncle-linux-arm64/${sha_la}/" \
              -e "s/REPLACE_WITH_SHA256_OF_fluncle-linux-x64/${sha_lx}/" \
              apps/cli/packaging/homebrew/fluncle.rb > tap/Formula/fluncle.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/fluncle.rb
          git commit -m "fluncle ${VERSION}" || { echo "no formula change"; exit 0; }
          git push
